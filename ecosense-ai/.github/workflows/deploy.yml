name: EcoSense AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    # We load robust dependencies seamlessly testing spatial libraries smoothly 
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: ecosense_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecosense_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Setup Geospatial Libraries (GDAL/PROJ)
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libproj-dev gdal-bin
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage black ruff
        
    - name: Lint Analysis
      working-directory: ./backend
      run: |
        ruff check .
        
    - name: Django Test Suite
      working-directory: ./backend
      env:
        DATABASE_URL: postgis://ecosense_user:password@localhost:5432/ecosense_test
        REDIS_URL: redis://localhost:6379/1
        SECRET_KEY: testing-secret-key-123
        DEBUG: True
      run: |
        coverage run manage.py test
        coverage report

  deploy-frontend-vercel:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

  deploy-backend-aws:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH directly structurally mapping constraints
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/ecosense-ai
            git pull origin main
            docker-compose -f docker-compose.prod.yml build
            docker-compose -f docker-compose.prod.yml up -d
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
