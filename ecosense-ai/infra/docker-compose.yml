# ===========================================
# EcoSense AI — Docker Compose (DEV)
# ===========================================

version: "3.8"

services:

  db:
    image: postgis/postgis:15-3.3
    container_name: ecosense-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecosense
      POSTGRES_USER: ecosense
      POSTGRES_PASSWORD: ecosense_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ecosense-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ecosense-backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ../backend/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ecosense-celery-worker
    command: celery -A core worker --loglevel=info
    env_file:
      - ../backend/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ../backend:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
